# Daily-run snapshot + MSS schedule via GitHub Actions (Asia/Shanghai trading hours).
#
# Required repository secrets:
#   AGENT_REACH_CONFIG_YAML  — full ~/.agent-reach/config.yaml contents
# Optional:
#   AGENT_REACH_PORTFOLIO_JSON — portfolio.json (defaults to repo example)
#
# Manual run: Actions → daily-run schedule → Run workflow
# Cron uses UTC; times below = Asia/Shanghai (UTC+8).

name: daily-run schedule

on:
  schedule:
    # 08:00 CST — morning + MSS forecast + Feishu
    - cron: "0 0 * * 1-5"
    # 09:30–15:00 CST — intraday S1–S12 + Lookback MSS (~every 24 min)
    - cron: "30 1 * * 1-5"
    - cron: "54 1 * * 1-5"
    - cron: "18 2 * * 1-5"
    - cron: "42 2 * * 1-5"
    - cron: "6 3 * * 1-5"
    - cron: "30 3 * * 1-5"
    - cron: "0 5 * * 1-5"
    - cron: "24 5 * * 1-5"
    - cron: "48 5 * * 1-5"
    - cron: "12 6 * * 1-5"
    - cron: "36 6 * * 1-5"
    - cron: "0 7 * * 1-5"
    # 15:30 CST — close + MSS curve + verify
    - cron: "30 7 * * 1-5"
  workflow_dispatch:
    inputs:
      job:
        description: "morning | intraday | close"
        required: true
        default: intraday
        type: choice
        options:
          - morning
          - intraday
          - close
      dry_run:
        description: "Skip Feishu push"
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-run-schedule
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INPUT_JOB: ${{ github.event.inputs.job }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve job (Asia/Shanghai)
        id: resolve
        run: |
          set -euo pipefail
          bash scripts/gha-daily-run-resolve-job.sh >> "$GITHUB_OUTPUT"

      - name: Skip outside trading windows
        if: steps.resolve.outputs.skip == 'true'
        run: |
          echo "Outside morning/intraday/close window — skipping."
          exit 0

      - name: Trading date (Asia/Shanghai)
        if: steps.resolve.outputs.skip != 'true'
        id: tz
        run: echo "date=$(TZ=Asia/Shanghai date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore daily-run state cache
        if: steps.resolve.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.agent-reach/daily_run
          key: daily-run-state-${{ steps.tz.outputs.date }}
          restore-keys: |
            daily-run-state-

      - name: Setup Python
        if: steps.resolve.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node (mcporter / Exa)
        if: steps.resolve.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install agent-reach + mcporter
        if: steps.resolve.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[daily-run]"
          npm install -g mcporter

      - name: Bootstrap config and portfolio
        if: steps.resolve.outputs.skip != 'true'
        env:
          AGENT_REACH_CONFIG_YAML: ${{ secrets.AGENT_REACH_CONFIG_YAML }}
          AGENT_REACH_PORTFOLIO_JSON: ${{ secrets.AGENT_REACH_PORTFOLIO_JSON }}
        run: bash scripts/gha-daily-run-setup.sh

      - name: Run scheduled job
        if: steps.resolve.outputs.skip != 'true'
        run: |
          set -euo pipefail
          job="${{ steps.resolve.outputs.job }}"
          extra=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            extra="--dry-run"
          fi
          agent-reach daily-run schedule run "$job" $extra

      - name: Upload run manifest
        if: steps.resolve.outputs.skip != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-run-${{ steps.tz.outputs.date }}-${{ steps.resolve.outputs.job }}-${{ github.run_number }}
          path: ~/.agent-reach/daily_run/runs/
          if-no-files-found: ignore
          retention-days: 14
