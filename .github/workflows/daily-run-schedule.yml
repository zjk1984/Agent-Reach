# Daily-run snapshot + MSS schedule via GitHub Actions (北京时间 / Asia/Shanghai).
#
# Required repository secrets:
#   AGENT_REACH_CONFIG_YAML  — full ~/.agent-reach/config.yaml contents
# Optional:
#   AGENT_REACH_PORTFOLIO_JSON — one-time seed if no cache / no config/daily_run_portfolio.json
#
# Initial holdings without secrets: commit config/daily_run_portfolio.json to the repo.
# Reset without secrets: Actions → Run workflow → reset_portfolio=true (uses repo file).
#
# Manual run: Actions → daily-run schedule → Run workflow

name: daily-run schedule

on:
  schedule:
    # 07:00 北京时间 — 盘前 S1 MSS 扫描 + 飞书
    - cron: "0 7 * * 1-5"
      timezone: Asia/Shanghai
    # 08:00 北京时间 — 早盘全量分析（含 S2 MSS）+ 飞书
    - cron: "0 8 * * 1-5"
      timezone: Asia/Shanghai
    # 09:30–15:00 北京时间 — 盘中 S3–S12 + Lookback MSS
    - cron: "30 9 * * 1-5"
      timezone: Asia/Shanghai
    - cron: "0 10 * * 1-5"
      timezone: Asia/Shanghai
    - cron: "30 10 * * 1-5"
      timezone: Asia/Shanghai
    - cron: "0 11 * * 1-5"
      timezone: Asia/Shanghai
    - cron: "30 11 * * 1-5"
      timezone: Asia/Shanghai
    - cron: "0 13 * * 1-5"
      timezone: Asia/Shanghai
    - cron: "30 13 * * 1-5"
      timezone: Asia/Shanghai
    - cron: "0 14 * * 1-5"
      timezone: Asia/Shanghai
    - cron: "30 14 * * 1-5"
      timezone: Asia/Shanghai
    - cron: "0 15 * * 1-5"
      timezone: Asia/Shanghai
    # 15:30 北京时间 — 收盘复盘 + MSS 曲线 + 验证
    - cron: "30 15 * * 1-5"
      timezone: Asia/Shanghai
    # 09:00 北京时间 周六 — 周报总结（盈亏、持股、观察池、板块）
    - cron: "0 9 * * 6"
      timezone: Asia/Shanghai
    # 09:00 北京时间 周日 — 下周预测（持股/观察池日走势、热点、MSS）
    - cron: "0 9 * * 0"
      timezone: Asia/Shanghai
  workflow_dispatch:
    inputs:
      job:
        description: "morning | intraday | close | weekly | forecast"
        required: true
        default: intraday
        type: choice
        options:
          - morning
          - intraday
          - close
          - weekly
          - forecast
      dry_run:
        description: "Skip Feishu push"
        required: false
        default: false
        type: boolean
      reset_portfolio:
        description: "Re-seed portfolio.json from repo config (ignore cache)"
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-run-schedule
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    env:
      TZ: Asia/Shanghai
      INPUT_JOB: ${{ github.event.inputs.job }}
      GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fork schedule notice
        run: |
          set -euo pipefail
          is_fork=$(gh api "repos/${{ github.repository }}" --jq '.isFork' 2>/dev/null || echo "unknown")
          if [ "$is_fork" = "true" ]; then
            echo "::warning::Fork 仓库的 cron 默认不会自动触发。请到 Actions 页点击「Enable scheduled workflows」，或使用 scripts/dispatch-daily-run-local-cron.sh 本地定时触发。"
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled run fired: schedule=${{ github.event.schedule }}"
          fi

      - name: Resolve job (北京时间)
        id: resolve
        run: |
          set -euo pipefail
          bash scripts/gha-daily-run-resolve-job.sh >> "$GITHUB_OUTPUT"

      - name: Skip outside trading windows
        if: steps.resolve.outputs.skip == 'true'
        run: |
          echo "Outside morning/intraday/close window — skipping."
          exit 0

      - name: Trading date (北京时间)
        if: steps.resolve.outputs.skip != 'true'
        id: tz
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # Split restore/save: actions/cache@v4 skips upload on primary-key hit, so
      # intraday_state.json never accumulated S3+ across scheduled runs.
      - name: Restore daily-run state cache
        if: steps.resolve.outputs.skip != 'true'
        uses: actions/cache/restore@v4
        id: daily-run-cache
        with:
          path: ~/.agent-reach/daily_run
          key: daily-run-state-${{ steps.tz.outputs.date }}-${{ github.run_number }}
          restore-keys: |
            daily-run-state-${{ steps.tz.outputs.date }}-
            daily-run-state-

      - name: Setup Python
        if: steps.resolve.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node (mcporter / Exa)
        if: steps.resolve.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install agent-reach + mcporter
        if: steps.resolve.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[daily-run]"
          npm install -g mcporter

      - name: Bootstrap config and portfolio
        if: steps.resolve.outputs.skip != 'true'
        env:
          AGENT_REACH_CONFIG_YAML: ${{ secrets.AGENT_REACH_CONFIG_YAML }}
          AGENT_REACH_PORTFOLIO_JSON: ${{ secrets.AGENT_REACH_PORTFOLIO_JSON }}
          RESET_PORTFOLIO: ${{ github.event_name == 'workflow_dispatch' && inputs.reset_portfolio && 'true' || 'false' }}
        run: bash scripts/gha-daily-run-setup.sh

      - name: Run scheduled job
        if: steps.resolve.outputs.skip != 'true'
        run: |
          set -euo pipefail
          job="${{ steps.resolve.outputs.job }}"
          extra=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            extra="--dry-run"
          fi
          agent-reach daily-run schedule run "$job" $extra

      - name: Save daily-run state cache
        if: steps.resolve.outputs.skip != 'true' && always()
        uses: actions/cache/save@v4
        with:
          path: ~/.agent-reach/daily_run
          key: daily-run-state-${{ steps.tz.outputs.date }}-${{ github.run_number }}

      - name: Upload run manifest
        if: steps.resolve.outputs.skip != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-run-${{ steps.tz.outputs.date }}-${{ steps.resolve.outputs.job }}-${{ github.run_number }}
          path: ~/.agent-reach/daily_run/runs/
          if-no-files-found: ignore
          retention-days: 14
