# Daily-run schedule — manual runs only (local Linux cron is the default scheduler).
#
# Local cron (recommended):
#   bash scripts/daily-run-local-setup.sh
#   python3 -m agent_reach.cli daily-run schedule install
#   tail -f ~/.agent-reach/daily_run/logs/cron-$(date +%Y-%m-%d).log
#
# Manual trigger: Actions → daily-run schedule → Run workflow

name: daily-run schedule

on:
  workflow_dispatch:
    inputs:
      job:
        description: "morning | intraday | close | weekly | forecast"
        required: true
        default: intraday
        type: choice
        options:
          - morning
          - intraday
          - close
          - weekly
          - forecast
      dry_run:
        description: "Skip Feishu push"
        required: false
        default: false
        type: boolean
      reset_portfolio:
        description: "Re-seed portfolio.json from repo config (ignore cache)"
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-run-schedule
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    env:
      TZ: Asia/Shanghai
      INPUT_JOB: ${{ github.event.inputs.job }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve job
        id: resolve
        run: |
          set -euo pipefail
          echo "job=${INPUT_JOB:-intraday}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Trading date (北京时间)
        id: tz
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore daily-run state cache
        uses: actions/cache/restore@v4
        id: daily-run-cache
        with:
          path: ~/.agent-reach/daily_run
          key: daily-run-state-${{ steps.tz.outputs.date }}
          restore-keys: |
            daily-run-state-${{ steps.tz.outputs.date }}
            daily-run-state-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node (mcporter / Exa)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install agent-reach + mcporter
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[daily-run]"
          npm install -g mcporter

      - name: Bootstrap config and portfolio
        env:
          AGENT_REACH_CONFIG_YAML: ${{ secrets.AGENT_REACH_CONFIG_YAML }}
          AGENT_REACH_PORTFOLIO_JSON: ${{ secrets.AGENT_REACH_PORTFOLIO_JSON }}
          RESET_PORTFOLIO: ${{ inputs.reset_portfolio && 'true' || 'false' }}
        run: bash scripts/gha-daily-run-setup.sh

      - name: Run scheduled job
        env:
          MCPORTER_CONFIG: ${{ github.workspace }}/config/mcporter.json
        run: |
          set -euo pipefail
          job="${{ steps.resolve.outputs.job }}"
          extra=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            extra="--dry-run"
          fi
          agent-reach daily-run schedule run "$job" $extra

      - name: Save daily-run state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.agent-reach/daily_run
          key: daily-run-state-${{ steps.tz.outputs.date }}

      - name: Upload run manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-run-${{ steps.tz.outputs.date }}-${{ steps.resolve.outputs.job }}-${{ github.run_number }}
          path: ~/.agent-reach/daily_run/runs/
          if-no-files-found: ignore
          retention-days: 14
